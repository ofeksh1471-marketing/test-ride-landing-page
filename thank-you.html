<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה שנרשמתם | Recycles × Orbea</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: #0c0c0c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .back-btn {
      margin-top: 28px;
      display: inline-block;
      padding: 14px 40px;
      background: #ea6d00;
      color: #fff;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Heebo', sans-serif;
      text-decoration: none;
      transition: background .2s, transform .2s;
    }
    .back-btn:hover {
      background: #c05800;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255,255,255,.25);
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="toda.png" alt="תודה שנרשמתם!" />
  </div>

  <a href="index.html" class="back-btn">חזרה לדף הבית</a>

  <footer>© 2026 Recycles כל הזכויות שמורות</footer>

</body>
</html>
